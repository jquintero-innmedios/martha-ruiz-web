<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta — Martha Ruiz Solera</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --rojo:#cc1e2b;--rojo-oscuro:#a01520;--naranja:#e8631a;--amarillo:#f5c518;
  --verde:#2eaa4a;--azul:#1a5fb4;--blanco:#fff;--gris:#f4f4f4;--gris-t:#555;
  --negro:#111;--grad:linear-gradient(90deg,#cc1e2b 0%,#e8631a 28%,#f5c518 52%,#2eaa4a 74%,#1a5fb4 100%);
  --grad-rojo:linear-gradient(135deg,#cc1e2b 0%,#8b1018 100%);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--blanco);color:var(--negro);min-height:100vh;display:flex;flex-direction:column;align-items:center}

.rainbow-bar{height:5px;background:var(--grad);width:100%;position:fixed;top:0;z-index:100}

/* CLOSED */
.closed{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 20px}
.closed-icon{width:80px;height:80px;border-radius:50%;background:var(--rojo);display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin-bottom:24px}
.closed-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;color:var(--negro);margin-bottom:12px}
.closed-text{font-size:16px;color:var(--gris-t);max-width:400px;line-height:1.6}

/* LOADING */
#loadingState{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.spin{width:36px;height:36px;border:3px solid #e8e8e8;border-top-color:var(--rojo);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* SURVEY */
.survey{width:100%;max-width:680px;padding:40px 24px 60px}
.survey-header{text-align:center;margin-bottom:36px;padding-top:12px}
.survey-badge{display:inline-flex;align-items:center;gap:.6rem;background:var(--rojo);color:#fff;padding:.45rem 1.2rem;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
.badge-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
.survey-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;text-transform:uppercase;color:var(--negro);line-height:1;margin-bottom:8px}
.survey-title .hl{color:var(--rojo)}
.survey-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:1.05rem;color:var(--gris-t)}

.prog-bar{width:100%;height:4px;background:#e8e8e8;border-radius:4px;margin-bottom:32px;overflow:hidden}
.prog-fill{height:100%;background:var(--grad);border-radius:4px;transition:width .4s ease}

/* Cards */
.card{display:none;background:var(--blanco);border:1px solid #e8e8e8;border-radius:0;padding:32px 28px;margin-bottom:16px;animation:fadeUp .3s ease both}
.card.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-num{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--rojo);display:flex;align-items:center;gap:.6rem;margin-bottom:10px}
.card-num::before{content:'';width:20px;height:3px;background:var(--rojo)}
.card-q{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.2rem,3vw,1.5rem);font-weight:800;text-transform:uppercase;color:var(--negro);margin-bottom:20px;line-height:1.2}

/* Inputs */
.inp{width:100%;padding:14px 16px;border:2px solid #e8e8e8;border-radius:0;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--negro);background:var(--gris);transition:border-color .2s;outline:none}
.inp:focus{border-color:var(--rojo);background:#fff}
.inp::placeholder{color:#aaa}
textarea.inp{min-height:100px;resize:vertical}
select.inp{width:100%;padding:14px 16px;border:2px solid #e8e8e8;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--negro);background:var(--gris);appearance:none;-webkit-appearance:none;cursor:pointer;outline:none;transition:border-color .2s;border-radius:0}
select.inp:focus{border-color:var(--rojo);background:#fff}

/* Options */
.opts{display:grid;gap:8px}
.opt{padding:14px 16px;border:2px solid #e8e8e8;cursor:pointer;transition:all .2s;font-size:14px;color:var(--gris-t);background:var(--gris)}
.opt:hover{border-color:var(--naranja);background:rgba(232,99,26,.04)}
.opt.sel{border-color:var(--rojo);background:rgba(204,30,43,.06);color:var(--rojo-oscuro);font-weight:600}
.opt-l{display:inline-flex;width:22px;height:22px;border-radius:50%;background:#e8e8e8;color:var(--gris-t);font-size:11px;font-weight:700;align-items:center;justify-content:center;margin-right:10px;transition:all .2s}
.opt.sel .opt-l{background:var(--rojo);color:#fff}

/* Buttons */
.btns{display:flex;gap:12px;margin-top:24px}
.btn{flex:1;padding:14px 24px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:.92rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-red{background:var(--rojo);color:#fff;box-shadow:0 4px 16px rgba(204,30,43,.25)}
.btn-red:hover{background:var(--rojo-oscuro);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--negro);border:2px solid #e8e8e8}
.btn-ghost:hover{border-color:var(--negro)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* Success */
.ok{display:none;text-align:center;padding:60px 20px}
.ok-icon{width:80px;height:80px;border-radius:50%;background:var(--verde);display:inline-flex;align-items:center;justify-content:center;font-size:40px;color:#fff;margin-bottom:24px}
.ok-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;color:var(--negro);margin-bottom:12px}
.ok-text{font-size:15px;color:var(--gris-t);line-height:1.6;max-width:400px;margin:0 auto}

.err{color:var(--rojo);font-size:13px;margin-top:8px;display:none}

/* ADMIN */
.abtn{padding:8px 16px;border-radius:0;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s}
.abtn-open{background:var(--verde);color:#fff}
.abtn-closed{background:var(--rojo);color:#fff}
.abtn-outline{padding:8px 16px;border-radius:0;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:2px solid var(--rojo);background:transparent;color:var(--rojo);transition:all .2s}
.abtn-outline:hover{background:var(--rojo);color:#fff}
.abtn-danger{padding:8px 16px;border-radius:0;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:2px solid #999;background:transparent;color:#999;transition:all .2s}
.abtn-danger:hover{border-color:var(--rojo);color:var(--rojo);background:rgba(204,30,43,.05)}

/* Survey list */
.slist{display:grid;gap:12px;margin-bottom:24px}
.sitem{background:var(--blanco);border:1px solid #e8e8e8;border-radius:0;padding:20px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.sitem:hover{border-color:var(--rojo);box-shadow:0 4px 20px rgba(0,0,0,.06)}
.sitem-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase;color:var(--negro)}
.sitem-meta{font-size:12px;color:var(--gris-t);margin-top:2px}
.sitem-badge{padding:4px 10px;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.sitem-badge.open{background:rgba(46,170,74,.1);color:var(--verde)}
.sitem-badge.closed{background:rgba(204,30,43,.1);color:var(--rojo)}

/* Create form */
.create-form{display:none;background:var(--blanco);border:1px solid #e8e8e8;border-radius:0;padding:28px;margin-bottom:24px}
.create-form.active{display:block}
.create-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;text-transform:uppercase;color:var(--negro);margin-bottom:16px;letter-spacing:.02em}

/* Response cards */
.rcard{background:var(--blanco);border:1px solid #e8e8e8;border-radius:0;padding:16px 20px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;transition:all .2s}
.rcard:hover{border-color:var(--naranja)}
.rcard-info{flex:1}
.rcard-time{font-size:11px;color:#aaa;letter-spacing:.04em}
.rcard-body{font-size:14px;color:var(--negro);line-height:1.5;margin-top:4px}
.rcard-body strong{color:var(--rojo)}
.rcard-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:4px 8px;transition:color .2s}
.rcard-del:hover{color:var(--rojo)}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.st{background:var(--blanco);border:1px solid #e8e8e8;border-radius:0;padding:16px;text-align:center}
.st-v{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--rojo)}
.st-l{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gris-t);margin-top:4px}

.rsec{background:var(--blanco);border:1px solid #e8e8e8;border-radius:0;padding:20px;margin-bottom:16px}
.rsec-t{font-family:'Barlow Condensed',sans-serif;font-size:.92rem;font-weight:800;text-transform:uppercase;color:var(--negro);margin-bottom:16px;letter-spacing:.04em}
.ri{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e8e8e8}
.ri:last-child{border-bottom:none}
.ri-l{font-size:14px;color:var(--gris-t);flex:1}
.ri-bc{flex:2;height:6px;background:#e8e8e8;margin:0 12px;overflow:hidden}
.ri-b{height:100%;background:var(--rojo);transition:width .4s}
.ri-c{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--rojo);min-width:28px;text-align:right}

@media(max-width:480px){
  .survey{padding:28px 16px 40px}
  .card{padding:24px 20px}
  .survey-title{font-size:1.8rem}
  .sitem{flex-direction:column;gap:8px}
}
</style>
</head>
<body>

<div class="rainbow-bar"></div>

<div id="loadingState">
  <div class="spin"></div>
  <div style="font-size:14px;color:var(--gris-t)">Cargando encuesta...</div>
</div>

<div id="closedState" class="closed" style="display:none">
  <div class="closed-icon">✕</div>
  <div class="closed-title">Encuesta cerrada</div>
  <div class="closed-text">Esta encuesta ya no está recibiendo respuestas. Gracias por tu interés.</div>
</div>

<div id="surveyEl" class="survey" style="display:none">
  <div class="survey-header">
    <div class="survey-badge"><div class="badge-dot"></div>ENCUESTA DIGITAL</div>
    <div id="surveyTitle" class="survey-title"></div>
    <div id="surveySub" class="survey-sub"></div>
  </div>
  <div class="prog-bar"><div id="prog" class="prog-fill" style="width:0%"></div></div>
  <div id="questions"></div>

  <div id="okScreen" class="ok">
    <div class="ok-icon">✓</div>
    <div class="ok-title">¡Gracias por tu voz!</div>
    <div class="ok-text">Tu respuesta fue registrada.</div>
  </div>
  
  <div id="errMsg" class="err" style="text-align:center;margin-top:16px;font-size:14px"></div>
</div>

<script>
const API='https://nico.innmedios.com/api';
const PW='martha2026';
let SID='',survey=null,curQ=0,answers={};

// Get survey ID: ?id=xxx param > path > default to eventos-martha
const params=new URLSearchParams(window.location.search);
const pathSegs=window.location.pathname.split('/').filter(Boolean);
let sidFromPath='';
for(let i=pathSegs.length-1;i>=0;i--){
  const seg=pathSegs[i];
  if(seg.includes('.html')||seg.includes('.htm'))continue;
  if(seg==='encuesta')continue;
  sidFromPath=seg;break;
}
SID=params.get('id')||sidFromPath||'eventos-martha';

// If on static site without ID, default to eventos-martha (handled by SID default above)

async function init(){
  try{
    const r=await fetch(`${API}/surveys/${SID}`);
    if(!r.ok){document.getElementById('loadingState').innerHTML='<div style="text-align:center"><div style="font-size:48px">😕</div><div style="margin-top:12px;color:var(--gris-t)">Encuesta no encontrada</div></div>';return}
    const d=await r.json();
    survey=d.survey;
    if(!survey){document.getElementById('loadingState').innerHTML='<div style="text-align:center"><div style="font-size:48px">😕</div><div style="margin-top:12px;color:var(--gris-t)">Encuesta no encontrada</div></div>';return}
    document.getElementById('loadingState').style.display='none';
    if(!survey.open){document.getElementById('closedState').style.display='flex';return}
    renderSurvey();
  }catch(e){
    document.getElementById('loadingState').innerHTML='<div style="text-align:center"><div style="font-size:48px">⚠️</div><div style="margin-top:12px;color:var(--gris-t)">Error de conexión</div></div>';
  }
}

function renderSurvey(){
  document.getElementById('surveyEl').style.display='block';
  document.title=survey.title||'Encuesta';
  const titleEl=document.getElementById('surveyTitle');
  const parts=(survey.title||'').split(' — ');
  if(parts.length>1){
    titleEl.innerHTML=parts[0]+' <span class="hl">—</span> '+parts.slice(1).join(' — ');
  }else{
    titleEl.textContent=survey.title||'Encuesta';
  }
  const subEl=document.getElementById('surveySub');
  subEl.textContent=survey.subtitle||'Martha Isabel Ruiz Solera — Representante a la Cámara por Córdoba';

  const qs=survey.questions||[];
  const container=document.getElementById('questions');
  container.innerHTML='';

  qs.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='card'+(i===0?' active':'');
    card.id='q'+(i+1);

    let html=`<div class="card-num">Pregunta ${i+1} de ${qs.length}</div>`;
    html+=`<div class="card-q">${q.label}</div>`;

    if(q.type==='select'){
      html+=`<select id="ans_${q.id}" class="inp"><option value="">Selecciona...</option>`;
      (q.options||[]).forEach(o=>{html+=`<option value="${o}">${o}</option>`});
      html+=`</select>`;
    }else if(q.type==='textarea'){
      html+=`<textarea id="ans_${q.id}" class="inp" placeholder="${q.placeholder||''}"></textarea>`;
    }else if(q.type==='text'){
      html+=`<input type="text" id="ans_${q.id}" class="inp" placeholder="${q.placeholder||''}">`;
    }else if(q.type==='options'){
      html+=`<div class="opts" id="opts_${q.id}">`;
      const letters='ABCDEFGH';
      (q.options||[]).forEach((o,j)=>{
        html+=`<div class="opt" onclick="selOpt('${q.id}',this)" data-v="${o}"><span class="opt-l">${letters[j]||j+1}</span>${o}</div>`;
      });
      html+=`</div>`;
    }

    html+=`<div id="err_${q.id}" class="err">${q.type==='select'?'Selecciona una opción':'Este campo es requerido'}</div>`;
    html+=`<div class="btns">`;
    if(i>0)html+=`<button class="btn btn-ghost" onclick="prv(${i})">← Anterior</button>`;
    if(i<qs.length-1)html+=`<button class="btn btn-red" onclick="nxt(${i})">Siguiente →</button>`;
    else html+=`<button class="btn btn-red" onclick="submit()" id="subBtn">Enviar ✓</button>`;
    html+=`</div>`;

    card.innerHTML=html;
    container.appendChild(card);
  });
  curQ=0;
  upProg();
}

function selOpt(qid,el){
  const container=document.getElementById('opts_'+qid);
  container.querySelectorAll('.opt').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  answers[qid]=el.dataset.v;
  document.getElementById('err_'+qid).style.display='none';
}

function nxt(i){
  const qs=survey.questions;
  const q=qs[i];
  const val=document.getElementById('ans_'+q.id)?document.getElementById('ans_'+q.id).value.trim():answers[q.id]||'';
  if(q.required&&!val){document.getElementById('err_'+q.id).style.display='block';return}
  answers[q.id]=val;
  document.getElementById('q'+(i+1)).classList.remove('active');
  curQ=i+1;
  document.getElementById('q'+(curQ+1)).classList.add('active');
  upProg();
}

function prv(i){
  document.getElementById('q'+(i+1)).classList.remove('active');
  curQ=i-1;
  document.getElementById('q'+(curQ+1)).classList.add('active');
  upProg();
}

function upProg(){document.getElementById('prog').style.width=(curQ/(survey.questions.length)*100)+'%'}

async function submit(){
  const qs=survey.questions;
  let valid=true;
  qs.forEach(q=>{
    const val=document.getElementById('ans_'+q.id)?document.getElementById('ans_'+q.id).value.trim():answers[q.id]||'';
    if(q.required&&!val){document.getElementById('err_'+q.id).style.display='block';valid=false}
    answers[q.id]=val;
  });
  if(!valid)return;

  const btn=document.getElementById('subBtn');
  btn.disabled=true;btn.textContent='Enviando...';
  try{
    const r=await fetch(`${API}/surveys/${SID}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(answers)});
    if(r.status===403){document.getElementById('errMsg').textContent='La encuesta está cerrada';document.getElementById('errMsg').style.display='block';btn.disabled=false;btn.textContent='Enviar ✓';return}
    if(!r.ok)throw new Error();
    document.getElementById('q'+(qs.length)).classList.remove('active');
    document.getElementById('okScreen').style.display='block';
    document.querySelector('.prog-bar').style.display='none';
  }catch(e){
    document.getElementById('errMsg').textContent='Error de conexión';document.getElementById('errMsg').style.display='block';
    btn.disabled=false;btn.textContent='Enviar ✓';
  }
}

// ADMIN





let currentDetail='';






function expCSV(){window.open(`${API}/surveys/${currentDetail}/export`,'_blank')}

init();
</script>
</body>
</html>
